# Build + test gate (#126).
#
# Reuses the root orchestration scripts: `pnpm -r` runs workspaces in
# topological dependency order (shared/contracts -> apps/engine ->
# apps/client -> apps/workbench), so the compiled engine dist exists
# before apps/client's engine-link/seam.test.ts spawns it.
name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from "packageManager": "pnpm@9.15.4" in root package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Client unit tests are deliberately electron-free (shell.ts /
      # capture-renderer.ts are untested by design; the electron-driven
      # test:e2e:* scripts are not run here), so skip the ~100MB Electron
      # binary download.
      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
